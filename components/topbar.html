<div class="topbar" id="topbar">
    <button id="create-ticket-btn" class="topbar-button">Create New Ticket</button>

    <div id="ticket-modal" class="modal-overlay hidden">
        <div class="modal">
            <h2>Create New Ticket</h2>
            <form id="ticket-form">
                <label for="ticket-title">Title</label>
                <input type="text" id="ticket-title" placeholder="Enter ticket title" required />

                <label for="ticket-description">Description</label>
                <textarea id="ticket-description" placeholder="Describe the issue..." rows="4" required></textarea>

                <label for="ticket-priority">Priority</label>
                <select id="ticket-priority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>

                <div class="modal-actions">
                    <button class="form-buttons" type="submit" id="submit-ticket-btn">Submit</button>
                    <button class="form-buttons" type="button" id="close-modal-btn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div class="user-profile">
        <img src="/assets/images/pfp.jpg" alt="User Profile" class="profile-pic" id="profile-pic">
        <div class="dropdown-menu" id="user-dropdown">
            <div class="dropdown-header" id="dropdown-header">
                <!-- Dynamic username and email -->
            </div>
            <hr>
            <a href="#" class="dropdown-item">Logout</a>
        </div>
    </div>
    <p class="main-menu-username" id="main-menu-username"></p>
</div>
