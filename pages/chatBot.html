<!doctype html>
<html lang="en">
  <head>

    <!-- Basic Metadata -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/assets/images/favicon.png" />
    <title>Help Desk - ChatBot</title>

    <!-- Global and Component Stylesheets -->
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/sidebar.css" />
    <link rel="stylesheet" href="/css/topbar.css" />
    <link rel="stylesheet" href="/css/chatBot.css" />
    <link rel="stylesheet" href="/css/dark-mode.css">

    <!-- Font Awesome for Icons -->
    <script
      src="https://kit.fontawesome.com/d357d72767.js"
      crossorigin="anonymous"
    ></script>
</head>
<body>

    <!-- Main Layout Container -->
    <!-- Outer wrapper that holds the sidebar + main content in a flex/grid layout -->
    <div class="app-container">

      <!-- Sidebar injected dynamically by sidebar.js -->
      <nav id="sidebar"></nav>

      <!-- Main Content Area -->
      <div class="main">

        <!-- Topbar injected dynamically by topbar.js -->
        <div id="topbar"></div>

        <div class="content">

          <!-- Chat Interface -->
          <div class="chat-wrapper">

            <!-- Chat header: displays bot identity and clear chat action -->
            <div class="chat-header">
              <div class="bot-info">
                <!-- Bot avatar icon -->
                <div class="bot-avatar">
                  <i class="fa-solid fa-robot"></i>
                </div>
                <!-- Bot name and online status indicator -->
                <div class="bot-details">
                  <h3>Gemini Assistant</h3>
                  <span><i class="fa-solid fa-circle"></i> Online</span>
                </div>
              </div>
              <!-- Clears the chat message history; logic handled by chatBot.js -->
              <div class="chat-actions">
                <button title="Clear Chat">
                  <i class="fa-solid fa-trash-can"></i>
                </button>
              </div>
            </div>

            <!-- Scrollable message history; bot and user messages appended here by chatBot.js -->
            <div id="chat-messages" class="chat-messages">
              
              <!-- Initial greeting message shown on page load -->
              <div class="message bot-message">
                <div class="message-content">
                  Hello! I'm your HelpDesk assistant powered by Gemini. How can
                  I help you today?
                </div>
                <div class="message-time">10:00 AM</div>
              </div>

              <!-- Subsequent bot and user messages are injected here dynamically -->

            </div>

            <!-- Chat Input -->
            <div class="chat-input-area">
              <div class="input-container">

                <!-- Attachment button; functionality handled by chatBot.js -->
                <button class="attachment-btn">
                  <i class="fa-solid fa-paperclip"></i>
                </button>

                <!-- Message text input; autocomplete off to avoid browser suggestions -->
                <input
                  type="text"
                  id="user-input"
                  placeholder="Type your message here..."
                  autocomplete="off"
                />

                <!-- Send button; submits the message to the Gemini API via chatBot.js -->
                <button id="send-btn" class="send-btn">
                  <i class="fa-solid fa-paper-plane"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Frontend logic for components and chatbot -->
    <script type="module" src="/js/supabase.js"></script> <!-- Initializes the Supabase client; must load before modules that query the database -->
    <script type="module" src="/js/sidebar.js"></script> <!-- Renders and controls the sidebar -->
    <script type="module" src="/js/topbar.js"></script> <!-- Renders and controls the topbar -->
    <script type="module" src="/js/chatBot.js"></script> <!-- Handles message sending, Gemini API calls, and chat history rendering -->

  </body>
</html>
