<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Basic Metadata -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Desk - Reset Password</title>

    <!-- Favicon -->
    <link rel="icon" href="/assets/images/favicon.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/forgot-pw.css">
</head>
<body class="landing-page">

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-inner">

            <!-- Logo links back to home -->
            <div class="nav-logo">
                <a class="nav-link" href="/index.html">
                    <img src="/assets/images/GeminiHelpDeskLogo-Picsart-BackgroundRemover.png" alt="Help Desk Logo" class="nav-logo-img">
                </a>
            </div>

            <!-- Navigation links; Forgot Password omitted since the user is already on this page -->
            <div class="nav-links">
                <a href="/index.html" class="nav-link">Home</a>
                <a href="/pages/faq.html" class="nav-link">FAQ</a>
                <a href="/pages/login-page.html" class="nav-btn secondary">Log in</a>
                <a href="/pages/user-registration.html" class="nav-btn primary">Sign up</a>
            </div>
        </div>
    </nav>

    <main>

        <!-- Reset Page Container -->
        <div id="forgot-container" class="forgot-container">
            
            <!-- Centered modal card housing the form -->
            <div class="forgot-modal">
                <h2>Forgot Password</h2>
                
                <!-- Forgot password form; submission sends a reset email via Supabase (forgot-pw.js) -->
                <form id="forgot-form">

                    <!-- Email input used to look up the account and send the reset link -->
                    <label for="email">Enter Email:</label>
                    <input type="text" id="email" placeholder="Email" required/>
                                    
                    <!-- Error message shown if the email is not found or the request fails; hidden by default -->
                    <p id="error-msg" style="color:red; display:none;">Invalid credentials</p>
                    
                    <!-- Confirm and sign-up buttons displayed side by side -->
                    <div class="text-row">
                        <!-- Submits the email and triggers the password reset flow -->
                        <div class="text-field">
                            <button class="form-buttons" type="submit">Confirm</button>
                        </div>
                        <!-- Redirects to the registration page; handled by forgot-pw.js -->
                        <div class="text-field">
                            <button class="form-buttons" id="sign-up-button">Sign Up</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer Logic -->
    <!-- Footer content is injected dynamically via footer.js -->
    <div id="footer"></div>

    <!-- Forgot PW Authentication Logic -->
    <script type="module" src="/js/supabase.js"></script> <!-- Initializes the Supabase client for authentication -->
    <script type="module" src="/js/footer.js"></script> <!-- Renders the shared footer -->
    <script type="module" src="/js/forgot-pw.js"></script> <!-- Handles form submission and password reset email logic -->

</body>
</html>
