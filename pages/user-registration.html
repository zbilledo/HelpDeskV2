<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic Metadata -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Desk - Register</title>

    <!-- Favicon -->
    <link rel="icon" href="/assets/images/favicon.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/user-registration.css">
    <link rel="stylesheet" href="/css/footer.css">

</head>
<body class="landing-page">
    
    <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-inner">

                <!-- Logo links back to home -->
                <div class="nav-logo">
                    <a class="nav-link" href="/index.html">
                        <img src="/assets/images/GeminiHelpDeskLogo-Picsart-BackgroundRemover.png" alt="Help Desk Logo" class="nav-logo-img">
                    </a>
                </div>

                <!-- Navigation links; Sign up omitted since user is already on that page -->
                <div class="nav-links">
                    <a href="/index.html" class="nav-link">Home</a>
                    <a href="/pages/faq.html" class="nav-link">Help</a>
                    <a href="/pages/login-page.html" class="nav-btn secondary">Log in</a>
                </div>
            </div>
        </nav>
    
    <main>

        <!-- Registration Page Container -->
        <div id="register-container" class="register-container">

            <!-- Centered modal card housing the form -->
            <div class="register-modal">
                <h2>Create an Account</h2>
                
                <!-- Registration form; submission handled by user-registration.js -->
                <form id="register-form">

                    <!-- Row 1: First and last name side by side -->
                    <div class="text-row">
                        <div class="text-field">
                            <label for="first">First Name:</label>
                            <input type="text" id="first" placeholder="First Name" required/>
                        </div>
                        <div class="text-field">
                            <label for="last">Last Name:</label>
                            <input type="text" id="last" placeholder="Last Name" required/>
                        </div>
                    </div>

                    <!-- Row 2: Username and optional phone number -->
                    <div class="text-row">
                        <div class="text-field">
                            <label for="username">Username:</label>
                            <input type="text" id="username" placeholder="Username" required/>
                        </div>
                        <div class="text-field">
                            <!-- Phone is optional; no "required" attribute -->
                            <label for="phone">Phone Number:</label>
                            <input type="tel" id="phone" placeholder="Phone Number"/>
                        </div>
                    </div>

                    <!-- Full-width email field -->
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Email" required/>
                    
                    <!-- Password section: fields + live requirements checklist -->
                    <div class="password-wrapper">

                        <!-- Row 3: Password and confirmation side by side -->
                        <div class="text-row">
                            <div class="text-field">
                                <label for="password">Password:</label>
                                <input type="password" id="password" placeholder="Password" required/>
                            </div>
                            <div class="text-field">
                                <label for="confirm-password">Confirm Password:</label>
                                <input type="password" id="confirm-password" placeholder="Confirm Password" required/>
                            </div>
                        </div>

                        <!-- Live password requirements box; each <li> is toggled
                             to met/unmet state via JS as the user types -->
                        <div class="requirements-box" id="password-requirements">
                            <p class="requirements-title">Password must contain:</p>
                            <ul class="requirements-list">
                                <li id="req-length">At least 8 characters</li>
                                <li id="req-upper">At least 1 uppercase letter</li>
                                <li id="req-lower">At least 1 lowercase letter</li>
                                <li id="req-number">At least 1 number</li>
                                <li id="req-special">At least 1 special character</li>
                            </ul>
                        </div>
                    </div>

                    <!-- Submit button -->
                    <button class="form-buttons" type="submit">Register</button>

                    <!-- Redirect to login for users who already have an account -->
                    <a href="/pages/login-page.html" class="nav-link" style="align-self: center; padding: 8px;">Log in</a>
                    
                    <!-- Error message container; hidden by default, shown by JS on failure
                         (e.g., username already taken, passwords don't match) -->
                    <p id="error-msg" style="color:red; display:none;"></p>
                </form>
            </div>
        </div>
    </main>
    
    <!-- Footer content is injected dynamically via footer.js -->
    <div id="footer"></div>

    <!-- JS Modules -->
    <script type="module" src="/js/footer.js"></script> <!-- Renders the shared footer -->
    <script type="module" src="/js/sidebar.js"></script> <!-- Sidebar behavior (if applicable on this page) -->
    <script type="module" src="/js/user-registration.js"></script> <!-- Form validation and submission logic -->

</body>
</html>
