<!doctype html>
<html lang="en">
<head>
    <!-- Basic Metadata -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/images/favicon.png">
    <title>Help Desk - Tickets</title>

    <!-- Global and Component Stylesheets -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/sidebar.css">
    <link rel="stylesheet" href="/css/topbar.css">
    <link rel="stylesheet" href="/css/dark-mode.css">
    <link rel="stylesheet" href="/css/tickets-template.css">

    <!-- Font Awesome for Icons -->
    <script src="https://kit.fontawesome.com/d357d72767.js" crossorigin="anonymous"></script>
</head>
<body>

    <!-- Main Layout Container -->
    <!-- Outer wrapper that holds the sidebar + main content in a flex/grid layout -->
    <div class="app-container">

        <!-- Sidebar injected dynamically by sidebar.js -->
        <nav id="sidebar"></nav>

        <!-- Main Content Area -->
        <div class="main">

            <!-- Topbar injected dynamically by topbar.js -->
            <div id="topbar"></div>

            <!-- Page-Specific Content -->
            <div class="content">

                <!-- Ticket List Injection Point -->
                <!-- Entire ticket page content (header, filters, table, etc.)
                     is built and injected here by ticket-page.js -->
                <div id="ticket-container"></div>
            </div>
        </div>
    </div>

    <!-- Frontend logic for components -->
    <script type="module" src="/js/sidebar.js"></script> <!-- Renders and controls the sidebar -->
    <script type="module" src="/js/topbar.js"></script> <!-- Renders and controls the topbar -->
    <script type="module" src="/js/ticket-page.js"></script> <!-- Fetches tickets and builds the full page content -->
</body>
</html>
